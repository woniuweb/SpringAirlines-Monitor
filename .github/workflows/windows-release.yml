name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --noconfirm fare-monitor.spec

      - name: Prepare release bundle
        shell: powershell
        run: |
          $bundle = "dist\fare-monitor-windows"
          New-Item -ItemType Directory -Path $bundle -Force | Out-Null
          Copy-Item "dist\fare-monitor.exe" "$bundle\fare-monitor.exe" -Force
          Copy-Item "fare-monitor.toml" "$bundle\fare-monitor.toml" -Force
          Copy-Item "README.md" "$bundle\README.md" -Force
          Compress-Archive -Path "$bundle\*" -DestinationPath "dist\fare-monitor-windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fare-monitor-windows
          path: dist/fare-monitor-windows.zip

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fare-monitor.exe
            dist/fare-monitor-windows.zip
